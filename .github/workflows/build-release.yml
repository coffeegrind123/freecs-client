name: Build and Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64 \
            build-essential libgl-dev libasound2-dev

      - name: Clone and patch FTEQW
        run: |
          git clone --depth 1 https://github.com/fte-team/fteqw.git build/fteqw
          bash scripts/patch-fteqw.sh build/fteqw

      - name: Build FTEQW libraries (win64)
        run: cd build/fteqw/engine && make makelibs FTE_TARGET=win64

      - name: Build FTEQW client (win64)
        run: cd build/fteqw/engine && make gl-rel FTE_TARGET=win64 -j$(nproc)

      - name: Build FTEQW libraries (linux64)
        run: cd build/fteqw/engine && make makelibs FTE_TARGET=linux64

      - name: Build FTEQW client (linux64)
        run: cd build/fteqw/engine && make gl-rel FTE_TARGET=linux64 -j$(nproc)

      - name: Download game data
        run: |
          mkdir -p build/downloads
          curl -fsSL "https://www.frag-net.com/pkgs/package_valve.pk3" -o build/downloads/package_valve.pk3
          curl -fsSL "https://www.frag-net.com/pkgs/package_cstrike.pk3" -o build/downloads/package_cstrike.pk3
          curl -fsSL "https://archive.org/download/counter-strike-1.5/csv15full_cstrike.zip" -o build/downloads/cs15data.zip

      - name: Package clients
        run: |
          for PLATFORM in win64 linux64; do
            if [ "$PLATFORM" = "win64" ]; then
              EXE_SRC="build/fteqw/engine/release/fteglqw64.exe"
              EXE_NAME="fteqw64.exe"
            else
              EXE_SRC="build/fteqw/engine/release/fteglqw64"
              EXE_NAME="fteqw64"
            fi

            PKG="build/pkg-$PLATFORM/Half-Life"
            mkdir -p "$PKG/valve" "$PKG/cstrike"

            cp -f "$EXE_SRC" "$PKG/$EXE_NAME"
            chmod +x "$PKG/$EXE_NAME"

            cp -f build/downloads/package_valve.pk3 "$PKG/valve/"
            cp -f build/downloads/package_cstrike.pk3 "$PKG/cstrike/"
            cp -f build/downloads/cs15data.zip "$PKG/cstrike/pak0.pk3"

            cat > "$PKG/valve/liblist.gam" <<'LIBLIST'
          game "Half-Life"
          startmap "c0a0"
          mpentity "info_player_deathmatch"
          gamedll_linux "dlls/hl.so"
          gamedll "dlls/hl.dll"
          cldll "1"
          LIBLIST

            for item in cfg data decls fonts gfx maps particles progs resource scripts \
                        progs.dat csprogs.dat hud.dat quake.rc icon.tga \
                        default_aliases.cfg default_cstrike.cfg default_cvar.cfg; do
              [ -e "$item" ] && cp -a "$item" "$PKG/cstrike/"
            done

            cat > "$PKG/cstrike/autoexec.cfg" <<'CFG'
          set net_master1 "ms.cs16.net:27950"
          set com_protocolname "FTE-Quake"
          CFG

            if [ "$PLATFORM" = "win64" ]; then
              printf '@echo off\r\nstart "" "%%~dp0fteqw64.exe" -game cstrike +sv_master1 "ms.cs16.net:27950"\r\n' > "$PKG/Play FreeCS.bat"
              printf '@echo off\r\nstart "" "%%~dp0fteqw64.exe" -game cstrike -window +sv_master1 "ms.cs16.net:27950"\r\n' > "$PKG/Play FreeCS (Windowed).bat"
            else
              printf '#!/bin/bash\ncd "$(dirname "$0")"\n./fteqw64 -game cstrike +sv_master1 "ms.cs16.net:27950" "$@"\n' > "$PKG/play-freecs.sh"
              chmod +x "$PKG/play-freecs.sh"
            fi

            (cd "build/pkg-$PLATFORM" && zip -qr "../freecs-client-$PLATFORM.zip" Half-Life/)
            echo "Built freecs-client-$PLATFORM.zip ($(du -sh "build/freecs-client-$PLATFORM.zip" | cut -f1))"
          done

      - name: Get version info
        id: version
        run: |
          echo "short_hash=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"
          echo "tag=v$(date -u +%Y%m%d)-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Compute hashes
        id: hashes
        run: |
          echo "win64=$(sha256sum build/freecs-client-win64.zip | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "linux64=$(sha256sum build/freecs-client-linux64.zip | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Get log URL
        id: logs
        run: |
          CHECK_ID=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }}/check-runs --jq '.check_runs[] | select(.name == "build") | .id' 2>/dev/null || echo "")
          if [ -n "$CHECK_ID" ]; then
            echo "url=https://github.com/${{ github.repository }}/commit/${{ github.sha }}/checks/${CHECK_ID}/logs" >> "$GITHUB_OUTPUT"
          else
            echo "url=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create tag
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.version.outputs.tag }}
          name: "FreeCS Client ${{ steps.version.outputs.tag }}"
          artifacts: |
            build/freecs-client-win64.zip
            build/freecs-client-linux64.zip
          body: |
            ## Downloads

            | Platform | Description |
            |----------|-------------|
            | **Windows 64-bit** | Patched FTEQW client + FreeCS + CS 1.5 data |
            | **Linux 64-bit** | Patched FTEQW client + FreeCS + CS 1.5 data |

            Extract and run `Play FreeCS.bat` (Windows) or `play-freecs.sh` (Linux).

            ## FTEQW Patches Applied

            - Fix empty `infoResponse` (server sends full serverinfo instead of 17-byte header)
            - Fix `getserversResponse` bit-position parsing (small server lists no longer skipped)
            - Blank default QW masters (prevent server browser flooding)

            ## SHA-256 Hashes

            | File | Hash |
            |------|------|
            | `freecs-client-win64.zip` | `${{ steps.hashes.outputs.win64 }}` |
            | `freecs-client-linux64.zip` | `${{ steps.hashes.outputs.linux64 }}` |

            ## Build Info

            - Commit: [`${{ steps.version.outputs.short_hash }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
            - [Build log](${{ steps.logs.outputs.url }})

            See [README](https://github.com/${{ github.repository }}/blob/main/README.md) for details.
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
