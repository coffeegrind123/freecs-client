name: Build and Release

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64 \
            build-essential libgl-dev libasound2-dev libxss-dev libxrandr-dev \
            libxcursor-dev libxi-dev libpulse-dev megatools p7zip-full rsync

      - name: Build
        run: bash scripts/build-client.sh

      - name: Get version info
        id: version
        run: |
          echo "short_hash=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"
          echo "tag=v$(date -u +%Y%m%d)-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Compute hashes
        id: hashes
        run: |
          echo "win64=$(sha256sum build/freecs-client-win64.zip | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "linux64=$(sha256sum build/freecs-client-linux64.zip | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Get log URL
        id: logs
        run: |
          CHECK_ID=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }}/check-runs --jq '.check_runs[] | select(.name == "build") | .id' 2>/dev/null || echo "")
          if [ -n "$CHECK_ID" ]; then
            echo "url=https://github.com/${{ github.repository }}/commit/${{ github.sha }}/checks/${CHECK_ID}/logs" >> "$GITHUB_OUTPUT"
          else
            echo "url=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create tag
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.version.outputs.tag }}
          name: "FreeCS Client ${{ steps.version.outputs.tag }}"
          artifacts: |
            build/freecs-client-win64.zip
            build/freecs-client-linux64.zip
          body: |
            ## Downloads

            | Platform | Description |
            |----------|-------------|
            | **Windows 64-bit** | Patched FTEQW client + FreeCS + CS 1.5 data |
            | **Linux 64-bit** | Patched FTEQW client + FreeCS + CS 1.5 data |

            Extract and run `Play FreeCS.bat` (Windows) or `play-freecs.sh` (Linux).

            ## FTEQW Patches Applied

            - Fix empty `infoResponse` (server sends full serverinfo instead of 17-byte header)
            - Fix `getserversResponse` bit-position parsing (small server lists no longer skipped)
            - Blank default QW masters (prevent server browser flooding)

            ## SHA-256 Hashes

            | File | Hash |
            |------|------|
            | `freecs-client-win64.zip` | `${{ steps.hashes.outputs.win64 }}` |
            | `freecs-client-linux64.zip` | `${{ steps.hashes.outputs.linux64 }}` |

            ## Build Info

            - Commit: [`${{ steps.version.outputs.short_hash }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
            - [Build log](${{ steps.logs.outputs.url }})

            See [README](https://github.com/${{ github.repository }}/blob/main/README.md) for details.
          draft: false
          prerelease: false
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}
