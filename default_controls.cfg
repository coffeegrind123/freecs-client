// Standard Game Bindings
// Feel free to modify them however you like

// Clear all bindings...
unbindall

// Movement
bind w "+forward"
bind a "+moveleft"
bind s "+back"
bind d "+moveright"
bind SPACE "+jump"
bind CTRL "+duck"
bind LSHIFT "+speed"

// Combat
bind MOUSE1 "+attack"
bind MOUSE2 "+attack2"
bind r "+reload"
bind g "drop"

// Weapon selection
bind 1 "slot1"
bind 2 "slot2"
bind 3 "slot3"
bind 4 "slot4"
bind 5 "slot5"
bind MWHEELUP "invprev"
bind MWHEELDOWN "invnext"

// Buy menu
bind b "buy"
bind m "chooseteam"

// Interact button
bind e "+use"

// Flashlight button
bind f "impulse 100"

// Misc interface buttons
bind t "messagemode"
bind TAB "+showscores"
bind ESCAPE "togglemenu"
bind PAUSE "pause"

// Developer console
bind ~ "toggleconsole"